# =============================================================================
# scLncR - Smart-seq2 dataProcess example
# =============================================================================

# -----------------------------
# Input format and paths
# -----------------------------
# Replace /path/to/... with your local or server paths before running.
input_format: "featurecounts_matrix"
sequencing_platform: "smartseq2"
counts_dir: ""
counts_matrix: "/path/to/output/smartseq2_step2_count/featurecounts/smartseq2_count_matrix.tsv"
samples_info: "/path/to/smartseq2_fastq/samples_info.txt"
project_name: "scLncR_smartseq2"
output_dir: "/path/to/output/smartseq2_step3_dataProcess"

# -----------------------------
# Gene prefixes and QC filters
# -----------------------------
mt_name: "AthM"
lnc_name: "AthLnc"
min.RNAs: 100
max.RNAs: 7000
percent.mt: 10

# -----------------------------
# Dimensional reduction and clustering
# -----------------------------
nfeatures: 6000
dims: 15
resolution: 0.5

# -----------------------------
# Cell type annotation
# -----------------------------
anno_method: "none"
ref_file: ""
marker_gene_file: ""
tissue: ""
n_top_markers: 3
