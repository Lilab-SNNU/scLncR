# =============================================================================
# scLncR - Smart-seq2 prelnc example
# =============================================================================

# -----------------------------
# Input and output
# -----------------------------
# Replace /path/to/... with your local or server paths before running.
samples_dirs: "/path/to/smartseq2_fastq"
samples_info: "/path/to/smartseq2_fastq/samples_info.txt"
project_name: "scLncR_smartseq2"
output_path: "/path/to/output/smartseq2_step1_prelnc"
genome_file: "/path/to/reference/genome.fa"
gtf_file: "/path/to/reference/annotation.gtf"
lncrna_name: "AthLnc"
threads: 24

# -----------------------------
# Raw FASTQ-first input mode
# -----------------------------
input_type: "fastq"
sequencing_platform: "smartseq2"
read_layout: "single"

fastq_sample_regex: "^(.*?)_S\\d+_L\\d+_([IR][12])_\\d+\\.fastq\\.gz$"
r1_pattern: "_R1_"
r2_pattern: "_R2_"
i1_pattern: "_I1_"

# -----------------------------
# Discovery alignment and assembly
# -----------------------------
aligner_for_discovery: "hisat2"
assembler: "stringtie"
strandness: "unstranded"
min_transcript_length: 200
gffcompare_classes: ["i", "u", "x", "o"]
min_mapping_quality: 30
rebuild_hisat2_index: false
hisat2_index_prefix: ""

# -----------------------------
# Runtime controls
# -----------------------------
keep_intermediate: true
dry_run: false
sample_limit: 0
include_samples: []

# -----------------------------
# Legacy compatibility
# -----------------------------
prelnc_mode: "fastq_helper"
bam_manifest: ""
