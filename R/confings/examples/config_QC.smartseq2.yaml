# =============================================================================
# scLncR - Smart-seq2 raw FASTQ QC example
# =============================================================================

# -----------------------------
# Input and output
# -----------------------------
# Replace /path/to/... with your local or server paths before running.
input_dir: "/path/to/smartseq2_fastq"
output_dir: "/path/to/output/smartseq2_step0_qc"
file_pattern: "*.fastq.gz"
recursive: false

# -----------------------------
# Runtime controls
# -----------------------------
threads: 8
dry_run: false
sample_limit: 0
include_files: []

# -----------------------------
# FastQC settings
# -----------------------------
fastqc:
  enabled: true
  extract: true
  nogroup: false
  contaminants: ""
  adapters: ""
  extra_args: ""

# -----------------------------
# MultiQC settings
# -----------------------------
multiqc:
  enabled: true
  title: "scLncR Smart-seq2 raw FASTQ QC report"
  filename: "multiqc_report.html"
  extra_args: ""
