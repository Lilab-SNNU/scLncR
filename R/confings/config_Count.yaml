# =============================================================================
# scLncR - count configuration
# =============================================================================

# -----------------------------
# Platform and engine
# -----------------------------
sequencing_platform: "10x"             # 10x | smartseq2 | dropseq | generic
count_engine: "cellranger"             # cellranger | featurecounts | starsolo

# -----------------------------
# Input and output
# -----------------------------
# Replace /path/to/... with your local or server paths before running.
samples_dirs: "/path/to/raw_fastq"
samples_info: "/path/to/raw_fastq/samples_info.txt"
project_name: "scLncR"
output_path: "/path/to/output/step2_count"
threads: 24

# -----------------------------
# Reference files
# -----------------------------
genome_file: "/path/to/reference/genome.fa"
known_gtf: "/path/to/reference/annotation.gtf"
lnc_gtf: "/path/to/output/step1_prelnc/final_lnc.gtf"
combined_gtf: "/path/to/output/step1_prelnc/reference/combined_mRNA_lncRNA.gtf"

# -----------------------------
# FASTQ parsing
# -----------------------------
fastq_sample_regex: "^(.*?)_S\\d+_L\\d+_([IR][12])_\\d+\\.fastq\\.gz$"
r1_pattern: "_R1_"
r2_pattern: "_R2_"
i1_pattern: "_I1_"
single_pattern: ".fastq.gz"            # Smart-seq2/generic single-end FASTQ pattern
read_layout: "auto"                    # auto | paired | single

# -----------------------------
# Smart-seq2/generic alignment
# -----------------------------
aligner: "hisat2"                      # currently supported: hisat2
hisat2_index_prefix: ""
rebuild_hisat2_index: false
strandness: "unstranded"               # unstranded | FR | RF
min_mapping_quality: 10

# -----------------------------
# featureCounts settings
# -----------------------------
featurecounts:
  feature_type: "exon"
  attribute_type: "gene_id"
  count_multi_mapping_reads: false
  allow_multi_overlap: false
  extra_args: ""

# -----------------------------
# Optional StringTie abundance
# -----------------------------
stringtie_abundance:
  enabled: false
  extra_args: ""

# -----------------------------
# Platform notes
# -----------------------------
# The loader uses the top-level fields above. These notes document intended
# platform-specific combinations without changing runtime behavior.
platform_params:
  tenx:
    sequencing_platform: "10x"
    count_engine: "cellranger"
    note: "Build Cell Ranger reference from combined_gtf and run cellranger count from raw FASTQ."
  smartseq2:
    sequencing_platform: "smartseq2"
    count_engine: "featurecounts"
    read_layout: "single"
    note: "Run HISAT2 + samtools + featureCounts using combined_gtf."
  dropseq:
    sequencing_platform: "dropseq"
    count_engine: "starsolo"
    note: "Experimental placeholder; full UMI-aware quantification is planned."
  generic:
    sequencing_platform: "generic"
    count_engine: "featurecounts"
    note: "Experimental placeholder for non-10x/non-Smart-seq2 FASTQ."

# -----------------------------
# Runtime controls
# -----------------------------
dry_run: true
sample_limit: 0                        # 0 means no limit
include_samples: []
