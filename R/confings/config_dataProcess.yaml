# =============================================================================
# scLncR - dataProcess configuration
# =============================================================================

# -----------------------------
# Input format and paths
# -----------------------------
# input_format="10x": counts_dir points to Cell Ranger sample outputs or a
# parent directory containing filtered_feature_bc_matrix.
# input_format="featurecounts_matrix": counts_matrix points to a gene x sample
# TSV from featureCounts, used for Smart-seq2.
input_format: "10x"                    # 10x | featurecounts_matrix
sequencing_platform: "10x"             # 10x | smartseq2 | generic
counts_dir: "~/paper/paper_case/step2_count"
counts_matrix: ""
samples_info: "~/data/paper_test/samples_info.txt"
project_name: "scLncR"
output_dir: "~/paper/paper_case/step3_dataProcess"

# -----------------------------
# Gene prefixes and QC filters
# -----------------------------
mt_name: "AthM"                         # mitochondrial gene prefix
lnc_name: "AthLnc"                      # lncRNA gene prefix
min.RNAs: 100
max.RNAs: 7000
percent.mt: 10

# -----------------------------
# Dimensional reduction and clustering
# -----------------------------
nfeatures: 6000
dims: 15
resolution: 0.5

# -----------------------------
# Cell type annotation
# -----------------------------
anno_method: "SingleR"                  # SingleR | scMM | none
ref_file: "~/data/singler/Ryu_2019_507252.rds"
marker_gene_file: ""
tissue: ""
n_top_markers: 3

# -----------------------------
# Notes
# -----------------------------
# Use anno_method="none" to run preprocessing without annotation.
# ref_file is required when anno_method="SingleR".
# marker_gene_file and tissue are required when anno_method="scMM".
# counts_matrix is required only when input_format="featurecounts_matrix".
