# =============================================================================
# scLncR - function analysis configuration
# =============================================================================

# -----------------------------
# Global input and module selection
# -----------------------------
# input_seurat should point to a Seurat RDS from dataProcess, typically:
#   data_preprocess/preprocessed_result.rds
# or, after annotation:
#   data_annotation/anno_result.rds
input_seurat: "path/to/integrated_seurat.rds"

# Supported module keys: location | monocle2 | wgcna
# Note: location is kept as a backward-compatible internal key. It runs
# snRNA/scRNA enrichment analysis, not definitive subcellular localization.
run_modules: ["location", "monocle2", "wgcna"]

# -----------------------------
# snRNA/scRNA enrichment analysis
# -----------------------------
location:
  LOG2FC_THRESH: 0.25                    # log2 fold-change threshold
  PADJ_THRESH: 0.05                      # adjusted p-value threshold
  output_path: "./sn_sc_enrichment_results"
  lncRNA_name: "scLncR"                  # lncRNA prefix; letters, digits, hyphens

# -----------------------------
# Monocle2 trajectory analysis
# -----------------------------
monocle2:
  qval: 0.05                             # q-value threshold for ordering genes
  reduceDimensionMethod: "DDRTree"       # DDRTree | ICA | tSNE
  output_path: "./monocle2_results"
  hub_genes: "all"                       # all or comma-separated gene IDs

# -----------------------------
# WGCNA co-expression network analysis
# -----------------------------
wgcna:
  output_path: "./wgcna_results"
  cell_types: ["T_cell", "B_cell"]       # empty list means all cell types
  pro_name: "scLncR"                     # project prefix for network naming
  lnc_name: "AthLnc"                     # lncRNA prefix used by dataProcess
  gene_select_method: "fraction"         # fraction | variance
