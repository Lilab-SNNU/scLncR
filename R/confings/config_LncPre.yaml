# =============================================================================
# scLncR - prelnc configuration (raw FASTQ-first, technology-aware)
# =============================================================================

# -----------------------------
# Core inputs and outputs
# -----------------------------
samples_dirs: "/home/data/scLncR/data/paper_test"
samples_info: "/home/data/scLncR/data/paper_test/samples_info.txt"
project_name: "scLncR"
output_path: "/home/data/scLncR/paper/paper_case/step1_prelnc"
genome_file: "/home/data/scLncR/genome/TAIR10.fa"
gtf_file: "/home/data/scLncR/genome/Araport11_current.gtf"
lncrna_name: "AthLnc"
threads: 24

# -----------------------------
# Raw FASTQ-first mode
# -----------------------------
input_type: "fastq"               # main interface for this module
sequencing_platform: "10x"        # 10x | smartseq2 | dropseq | generic
read_layout: "auto"               # auto | single | paired

fastq_sample_regex: "^(.*?)_S\\d+_L\\d+_([IR][12])_\\d+\\.fastq\\.gz$"
r1_pattern: "_R1_"
r2_pattern: "_R2_"
i1_pattern: "_I1_"

# -----------------------------
# Discovery alignment and assembly
# -----------------------------
aligner_for_discovery: "hisat2"
assembler: "stringtie"
strandness: "RF"                  # RF | FR | unstranded
min_transcript_length: 200
gffcompare_classes: ["i", "u", "x", "o"]
min_mapping_quality: 30
rebuild_hisat2_index: false
hisat2_index_prefix: ""

# -----------------------------
# Runtime controls
# -----------------------------
keep_intermediate: true
dry_run: true
sample_limit: 0                   # 0 means no limit
include_samples: []

# -----------------------------
# Legacy compatibility fields (ignored in raw FASTQ-first mode)
# -----------------------------
prelnc_mode: "fastq_helper"
bam_manifest: ""
