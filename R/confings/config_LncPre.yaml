# =============================================================================
# scLncR - prelnc configuration
# =============================================================================

# -----------------------------
# Input and output
# -----------------------------
# Replace /path/to/... with your local or server paths before running.
samples_dirs: "/path/to/raw_fastq"
samples_info: "/path/to/raw_fastq/samples_info.txt"
project_name: "scLncR"
output_path: "/path/to/output/step1_prelnc"
genome_file: "/path/to/reference/genome.fa"
gtf_file: "/path/to/reference/annotation.gtf"
lncrna_name: "AthLnc"                  # prefix assigned to predicted lncRNAs
threads: 24

# -----------------------------
# Raw FASTQ-first input mode
# -----------------------------
input_type: "fastq"                    # current user-facing input mode
sequencing_platform: "10x"             # 10x | smartseq2 | dropseq | generic
read_layout: "auto"                    # auto | single | paired

# 10x mode uses R2 cDNA reads for candidate transcript evidence.
fastq_sample_regex: "^(.*?)_S\\d+_L\\d+_([IR][12])_\\d+\\.fastq\\.gz$"
r1_pattern: "_R1_"
r2_pattern: "_R2_"
i1_pattern: "_I1_"

# -----------------------------
# Discovery alignment and assembly
# -----------------------------
aligner_for_discovery: "hisat2"        # currently supported: hisat2
assembler: "stringtie"                 # currently supported: stringtie
strandness: "RF"                       # RF | FR | unstranded
min_transcript_length: 200
gffcompare_classes: ["i", "u", "x", "o"]
min_mapping_quality: 30
rebuild_hisat2_index: false
hisat2_index_prefix: ""

# -----------------------------
# Runtime controls
# -----------------------------
keep_intermediate: true
dry_run: true                          # preview manifests and commands only
sample_limit: 0                        # 0 means no limit
include_samples: []

# -----------------------------
# Legacy compatibility
# -----------------------------
# These fields are retained for old configs; raw FASTQ remains the main input.
prelnc_mode: "fastq_helper"
bam_manifest: ""
